services:
  - type: web
    name: edu-imv
    env: node
    plan: free
    rootDir: assests/Asset-Manager
    buildCommand: npx pnpm install && npx pnpm --filter @workspace/api-server build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: edu-imv-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: edu-imv-db
    plan: free
