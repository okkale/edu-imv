kind = "web"
previewPath = "/"
title = "Indrayani Mahavidyalaya College Website"
version = "1.0.0"
id = "artifacts/Indrayani Mahavidyalaya"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18180

[services.development]
run = "pnpm --filter @workspace/Indrayani Mahavidyalaya run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/Indrayani Mahavidyalaya", "run", "build" ]
publicDir = "artifacts/Indrayani Mahavidyalaya/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18180"
BASE_PATH = "/"
